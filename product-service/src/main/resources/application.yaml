spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_product_db   # overridden by SPRING_DATASOURCE_URL env var in Docker
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  config:
    import: optional:configserver:http://localhost:8888   # overridden by SPRING_CONFIG_IMPORT env var in Docker

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka   # overridden by EUREKA_CLIENT_SERVICEURL_DEFAULTZONE env var in Docker

server:
  port: 8084
